# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push: {}
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        run: python scripts/smoke_test.py

      - name: Run full pytest
        run: pytest -q

      - name: Run export import test
        run: pytest tests/test_export_imports.py -q

      - name: Run short CPU benchmark
        run: |
          python export/benchmark_cpu.py \
            --checkpoint checkpoints/tiny-test/latest.pt \
            --config configs/tiny.json \
            --tokenizer tokenizer/tokenizer.json \
            --prompt "<|user|>Create a Python function that adds two numbers.<|assistant|>" \
            --max_new_tokens 10 \
            --mode eager
